[llm]
create_from_config = true

base_url =
model_name = gpt-4.1-mini

temperature = 0
max_retries = 2
timeout_seconds = 180

content_type = application/json
x_dep_ticket =
send_system_name =
user_id =
user_type =

prompt_msg_id = auto
completion_msg_id = auto

[data]
# adapter: data.py의 load_df_from_company_db()를 사용합니다.
# csv/parquet: 로컬 테스트용 파일을 읽습니다.
mode = adapter
path =
query_file = queries/main.sql
module_folder =
sql_adapter_module = sql_adapter

[columns]
id = 출원번호
title = 제목
major = 대분류
middle = 중분류
phenomenon = 현상
action = 조치
label = 정답_판단결과

[sampling]
fixed_size = 1000
recent_size = 500
hard_size = 500
random_seed = 42
vary_seed_by_cycle = true

[preprocess]
max_phenomenon_chars = 8000
max_action_chars = 2000
max_title_chars = 300
max_total_images = 5
max_phenomenon_images = 3
max_action_images = 2

[runtime]
# fast: evidence + arbiter 중심. 비용이 낮습니다.
# tournament: evidence + 진성 advocate + 가성 advocate + critic + arbiter. 비용이 높지만 안정적입니다.
judge_mode = tournament
max_workers = 4
max_cycles = 1
sleep_seconds = 0
batch_size = 500
progress_every = 10
heartbeat_seconds = 30
trace_first_n = 3
llm_calls_per_minute = 25
llm_retry_wait_seconds = 300
llm_max_attempts = 20

[policy]
current_policy_path = policies/current_policy.md
candidate_count = 3
promotion_min_score_gain = 0.02
promotion_max_fn_regression = 0
promotion_max_fp_regression = 5
candidate_min_policy_length_ratio = 0.90
candidate_min_policy_chars = 1500
candidate_max_changed_lines = 12
candidate_max_deleted_lines = 0
candidate_max_addendum_lines = 6

[daily_prediction]
query_file = queries/daily_prediction.sql
ddl_file = queries/create_daily_result_tables.sql
target_date = auto_yesterday
auto_create_result_table = true
result_history_table = ai_stopwork_judgement_history
latest_view = v_ai_stopwork_judgement_latest
dedupe_key = 출원번호
dedupe_order_column =
judge_mode = tournament
max_workers = 40
llm_calls_per_minute = 98
llm_retry_wait_seconds = 300
llm_max_attempts = 20
insert_batch_size = 100
policy_version = current_policy.md

[artifacts]
output_dir = outputs
casebook_path = artifacts/casebook.jsonl
hard_cases_path = artifacts/hard_cases.csv
save_images = false
image_dir = artifacts/images
