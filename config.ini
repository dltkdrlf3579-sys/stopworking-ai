[llm]
create_from_config = true

base_url =
model_name = gpt-4.1-mini

temperature = 0
max_retries = 2

content_type = application/json
x_dep_ticket =
send_system_name =
user_id =
user_type =

prompt_msg_id = auto
completion_msg_id = auto

[data]
# adapter: data.py의 load_df_from_company_db()를 사용합니다.
# csv/parquet: 로컬 테스트용 파일을 읽습니다.
mode = adapter
path =
query_file = queries/main.sql
module_folder =
sql_adapter_module = sql_adapter

[columns]
id = 출원번호
title = 제목
major = 대분류
middle = 중분류
phenomenon = 현상
action = 조치
label = 정답_판단결과

[sampling]
fixed_size = 1000
recent_size = 500
hard_size = 500
random_seed = 42

[runtime]
# fast: evidence + arbiter 중심. 비용이 낮습니다.
# tournament: evidence + 진성 advocate + 가성 advocate + critic + arbiter. 비용이 높지만 안정적입니다.
judge_mode = tournament
max_workers = 8
max_cycles = 1
sleep_seconds = 0
batch_size = 2000

[policy]
current_policy_path = policies/current_policy.md
candidate_count = 3
promotion_min_score_gain = 0.01
promotion_max_fn_regression = 0
promotion_max_fp_regression = 5

[artifacts]
output_dir = outputs
casebook_path = artifacts/casebook.jsonl
hard_cases_path = artifacts/hard_cases.csv
save_images = false
image_dir = artifacts/images
